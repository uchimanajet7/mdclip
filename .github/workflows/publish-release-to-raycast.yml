name: Inactive - Publish Release to Raycast

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Existing GitHub Release tag to publish to the Raycast Store"
        required: true
        type: string
  workflow_call:
    inputs:
      release_tag:
        description: "Existing GitHub Release tag to publish to the Raycast Store"
        required: true
        type: string
    secrets:
      RAYCAST_PUBLISH_GITHUB_TOKEN_CLASSIC:
        required: true

permissions:
  contents: read

jobs:
  inactive:
    name: Raycast Store publish is inactive
    runs-on: ubuntu-latest
    if: ${{ vars.MDCLIP_RAYCAST_STORE_PUBLISH_REAPPROVED != 'true' }}
    steps:
      - name: Explain inactive Store publish path
        run: |
          echo "Raycast Store publishing is inactive for MdClip."
          echo "Complete the Store publication prerequisites in raycast-publish/publish.md before enabling this workflow."
          echo "Set repository variable MDCLIP_RAYCAST_STORE_PUBLISH_REAPPROVED=true only when the prerequisites are complete and Store publication is intentionally started."
          exit 1

  publish:
    name: Publish Release to Raycast
    runs-on: ubuntu-latest
    if: ${{ vars.MDCLIP_RAYCAST_STORE_PUBLISH_REAPPROVED == 'true' }}
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Validate release tag
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.release_tag }}
        run: |
          if [[ ! "$RELEASE_TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([+-][0-9A-Za-z.-]+)?$ ]]; then
            echo "release_tag must use vX.Y.Z format: ${RELEASE_TAG}" >&2
            exit 1
          fi

          git fetch --force --tags origin

          if ! git rev-parse --verify --quiet "refs/tags/${RELEASE_TAG}^{commit}" >/dev/null; then
            echo "Git tag does not exist: ${RELEASE_TAG}" >&2
            exit 1
          fi

          if ! gh release view "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" >/dev/null; then
            echo "GitHub Release does not exist: ${RELEASE_TAG}" >&2
            exit 1
          fi

      - name: Checkout release source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.release_tag }}
          path: release-source

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version-file: release-source/.node-version
          package-manager-cache: false

      - name: Setup release npm
        run: node scripts/setup-npm.mjs --repo-root release-source

      - name: Verify release manifest tag
        env:
          RELEASE_TAG: ${{ inputs.release_tag }}
        run: |
          MANIFEST_TAG="$(node -p "require('./release-source/.github/release-manifest.json').tag")"
          if [ "$MANIFEST_TAG" != "$RELEASE_TAG" ]; then
            echo "release_tag must match .github/release-manifest.json tag." >&2
            echo "release_tag: ${RELEASE_TAG}" >&2
            echo "manifest tag: ${MANIFEST_TAG}" >&2
            exit 1
          fi

      - name: Validate release manifest
        run: node scripts/release-manifest.mjs validate --repo-root release-source

      - name: Verify Raycast publish GitHub token
        env:
          RAYCAST_PUBLISH_GITHUB_TOKEN_CLASSIC: ${{ secrets.RAYCAST_PUBLISH_GITHUB_TOKEN_CLASSIC }}
        run: |
          if [ -z "$RAYCAST_PUBLISH_GITHUB_TOKEN_CLASSIC" ]; then
            echo "RAYCAST_PUBLISH_GITHUB_TOKEN_CLASSIC is required for Raycast Store publish." >&2
            echo "Set a GitHub Personal Access Token classic with public_repo scope as the repository secret named RAYCAST_PUBLISH_GITHUB_TOKEN_CLASSIC." >&2
            exit 1
          fi

      - name: Publish or update Raycast Pull Request
        env:
          MDCLIP_RAYCAST_STORE_PUBLISH_REAPPROVED: ${{ vars.MDCLIP_RAYCAST_STORE_PUBLISH_REAPPROVED }}
          RAYCAST_PUBLISH_GITHUB_TOKEN_CLASSIC: ${{ secrets.RAYCAST_PUBLISH_GITHUB_TOKEN_CLASSIC }}
        run: node scripts/publish-raycast-pr.mjs --source release-source --release-tag "${{ inputs.release_tag }}"
