name: Toolchain Freshness

on:
  workflow_dispatch:
  schedule:
    - cron: "17 9 * * 2"
      timezone: "Asia/Tokyo"

permissions:
  contents: read

jobs:
  check:
    name: Check Node.js and npm
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .node-version
          package-manager-cache: false

      - name: Setup npm
        run: node scripts/setup-npm.mjs

      - name: Check toolchain freshness
        run: npm run check:toolchain
