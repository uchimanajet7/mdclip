name: Release

on:
  workflow_dispatch:
    inputs:
      publish_to_raycast:
        description: "Publish this release to the Raycast Store"
        required: true
        type: boolean
        default: true

permissions:
  contents: write

jobs:
  prepare-tag:
    name: Prepare Release Tag
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.manifest.outputs.tag }}
      title: ${{ steps.manifest.outputs.title }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Read release manifest
        id: manifest
        run: node scripts/release-manifest.mjs outputs >> "$GITHUB_OUTPUT"

      - name: Validate release manifest
        run: node scripts/release-manifest.mjs validate --publish-to-raycast "${{ inputs.publish_to_raycast }}"

      - name: Run local checks
        run: npm run check

      - name: Create and push release tag
        run: |
          TAG="${{ steps.manifest.outputs.tag }}"
          if git ls-remote --exit-code --tags origin "refs/tags/${TAG}" >/dev/null 2>&1; then
            echo "Tag already exists: ${TAG}" >&2
            exit 1
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "${TAG}" "${GITHUB_SHA}"
          git push origin "refs/tags/${TAG}"

  raycast-publish:
    name: Raycast Publish
    needs: prepare-tag
    if: ${{ inputs.publish_to_raycast }}
    uses: ./.github/workflows/raycast-publish.yml
    with:
      ref: ${{ needs.prepare-tag.outputs.tag }}
    secrets: inherit

  github-release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs:
      - prepare-tag
      - raycast-publish
    if: ${{ always() && needs.prepare-tag.result == 'success' && (!inputs.publish_to_raycast || needs.raycast-publish.result == 'success') }}
    permissions:
      contents: write
    steps:
      - name: Checkout release tag
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare-tag.outputs.tag }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate GitHub Release body
        run: node scripts/release-manifest.mjs body > "$RUNNER_TEMP/release-body.md"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.prepare-tag.outputs.tag }}
          TITLE: ${{ needs.prepare-tag.outputs.title }}
        run: gh release create "$TAG" --title "$TITLE" --notes-file "$RUNNER_TEMP/release-body.md" --verify-tag
