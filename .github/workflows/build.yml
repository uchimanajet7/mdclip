name: Build

on:
  workflow_dispatch:
  workflow_call:
  push:
    branches:
      - "**"
  pull_request:

permissions:
  contents: read

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: npm

      - name: Setup npm
        run: node scripts/setup-npm.mjs

      - name: Verify dependency sources
        run: npm run check:dependencies

      - name: Install dependencies
        run: npm ci

      - name: Build extension
        run: npm run build

      - name: Run local verification
        run: npm run lint

      - name: Run Raycast CLI lint
        run: npm run lint:raycast
